<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            padding: 24px;
            background: #f6f7f9;
            color: #111827;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        .container {
            width: min(100%, 760px);
            margin: 48px auto;
            padding: 24px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
            text-align: center;
        }
        .code {
            font-size: 48px;
            line-height: 1;
            margin-bottom: 12px;
        }
        .subtext {
            color: #6b7280;
            margin-bottom: 24px;
        }
        .button {
            display: inline-block;
            border-radius: 8px;
            padding: 10px 16px;
            background: #111827;
            color: #ffffff;
            text-decoration: none;
        }
        .button:hover {
            background: #1f2937;
        }
        @media (max-width: 700px) {
            body {
                padding: 16px;
            }
            .container {
                margin: 24px auto;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="code">404</h1>
    <p class="subtext">Страница не найдена.</p>
    <a class="button" href="/">Вернуться в галерею</a>
</div>
</body>
</html>
