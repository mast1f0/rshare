<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            padding: 24px;
            background: #f6f7f9;
            color: #111827;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        .container {
            width: min(100%, 760px);
            margin: 48px auto;
            padding: 24px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtext {
            color: #6b7280;
            margin-bottom: 24px;
            text-align: center;
        }
        #upload {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        input[type="file"] {
            width: 100%;
            font-size: 16px;
            color: #111827;
        }
        .file-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding: 12px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #ffffff;
        }
        .file-wrapper h1 {
            font-size: 16px;
            margin: 0;
            text-align: left;
            overflow-wrap: anywhere;
        }
        .file-wrapper a {
            display: inline-block;
            border-radius: 8px;
            padding: 8px 12px;
            background: #111827;
            color: #ffffff;
            text-decoration: none;
            white-space: nowrap;
        }
        .file-wrapper a:hover {
            background: #1f2937;
        }
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            background: #111827;
            color: #ffffff;
            cursor: pointer;
            font-size: 16px;
            white-space: nowrap;
        }
        button:hover {
            background: #1f2937;
        }
        @media (max-width: 700px) {
            body {
                padding: 16px;
            }
            .container {
                margin: 24px auto;
                padding: 16px;
            }
            #upload {
                flex-direction: column;
                align-items: stretch;
            }
            .file-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            button {
                width: 100%;
            }
            .file-wrapper a {
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Gallery</h1>
    <p class="subtext">Upload your file in one click.</p>
    <form action="/upload" method="POST" enctype="multipart/form-data" id="upload">
        <input type="file" name="file" required>
        <button type="submit">Upload</button>
    </form>
</div>
</body>
</html>
