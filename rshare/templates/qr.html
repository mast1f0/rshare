<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            padding: 24px;
            background: #f6f7f9;
            color: #111827;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        .container {
            width: min(100%, 760px);
            margin: 48px auto;
            padding: 24px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #ffffff;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtext {
            color: #6b7280;
            margin-bottom: 24px;
        }
        img {
            display: block;
            width: 100%;
            max-width: 280px;
            height: auto;
            margin: 0 auto;
        }
        @media (max-width: 700px) {
            body {
                padding: 16px;
            }
            .container {
                margin: 24px auto;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>QR for share data</h1>
    <p class="subtext">Works only in local web</p>
    <img src="/qrcode.png" alt="QR Code">
</div>
</body>
</html>
